name: CI

on:
  push:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'config/**'
      - 'database/**'
      - 'composer.json'
      - 'phpunit.xml.dist'
      - 'phpstan.neon.dist'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'config/**'
      - 'database/**'
      - 'composer.json'
      - 'phpunit.xml.dist'
      - 'phpstan.neon.dist'
      - '.github/workflows/ci.yml'

jobs:
  test:
    name: php${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        php: ['8.3', '8.4']
    steps:
      - uses: actions/checkout@v4
        with:
          path: video-upload

      - name: Checkout course-core (sibling path dependency)
        uses: actions/checkout@v4
        with:
          repository: lalalili/course-core
          path: course-core

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        working-directory: video-upload
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Tests
        working-directory: video-upload
        run: composer test

      - name: Static analysis
        working-directory: video-upload
        run: composer analyse
