name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          path: video-upload

      - name: Checkout course-core (sibling path dependency)
        uses: actions/checkout@v4
        with:
          repository: lalalili/course-core
          path: course-core

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install dependencies
        working-directory: video-upload
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Tests
        working-directory: video-upload
        run: composer test

      - name: Static analysis
        working-directory: video-upload
        run: composer analyse

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
